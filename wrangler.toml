name = "trancut"
main = ".open-next/worker.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# OpenAI 같은 외부 API를 호출할 때 Cloudflare가 더 적절한 위치에서 실행하도록 함
# (드물게 OpenAI가 차단한 지역의 엣지 서버를 거쳐서 나는 에러를 줄이는 데 도움)
[placement]
mode = "smart"

[[d1_databases]]
binding = "DB"
database_name = "trancut-db"
database_id = "b8d95d0b-1e88-4f61-a6bb-16c59c3279c4"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "trancut-media"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "986ab864f6654b2bb4f636832438f6c8"
